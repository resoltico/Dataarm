name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build and publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publication-${{ github.workflow }}-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 26.1.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> ../.dataarm-artifacts/target

      - name: Run release posture verification
        run: npm run verify:project-status && npm run verify:dmg-packaging && npm run verify:github-packaging && npm run verify:release-publishing && npm run verify:app-version

      - name: Build unsigned Apple Silicon DMG
        run: npm run package:unsigned:dmg:macos-silicon

      - name: Build release checksum manifest
        run: node scripts/build-release-checksums.mjs

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: node scripts/publish-github-release.mjs

      - name: Verify GitHub release handoff
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: node scripts/verify-github-release.mjs
