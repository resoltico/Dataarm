name: quality-gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 26.1.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> ../.dataarm-artifacts/target
      - name: Install cargo-deny
        uses: taiki-e/install-action@b550161ef8a7bc4f2a671c0b03a18ac9ccedea1e # v2.79.1
        with:
          tool: cargo-deny@0.19.0
      - name: Install typos-cli
        uses: taiki-e/install-action@b550161ef8a7bc4f2a671c0b03a18ac9ccedea1e # v2.79.1
        with:
          tool: typos-cli@1.44.0
      - name: Run Node quality gates
        run: npm run quality:node
      - name: Run browser workbench proof lane
        run: npx playwright install --with-deps && npm run quality:browser-workbench
      - name: Run Rust quality gates
        run: npm run quality:rust

  desktop-surface:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 26.1.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> ../.dataarm-artifacts/target
      - name: Run desktop ship-surface packaging proof
        run: npm run package:adhoc-signed:dmg:macos-silicon

  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 26.1.0
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install pinned nightly with Miri
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly-2026-03-29
          components: miri
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> ../.dataarm-artifacts/target
      - name: Set up Miri
        run: cargo +nightly-2026-03-29 miri setup --manifest-path src-tauri/Cargo.toml
      - name: Run Miri
        run: npm run quality:miri
