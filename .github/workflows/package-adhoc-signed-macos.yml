name: package-adhoc-signed-macos

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to package and verify (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publication-${{ github.workflow }}-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  apple-silicon-dmg:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.1.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri -> ../.dataarm-artifacts/target

      - name: Run packaging posture verification
        run: npm run verify:project-status && npm run verify:dmg-packaging && npm run verify:github-packaging

      - name: Build ad-hoc signed Apple Silicon DMG
        run: npm run package:adhoc-signed:dmg:macos-silicon

      - name: Upload ad-hoc signed Apple Silicon DMG
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dataarm-ad-hoc-signed-macos-apple-silicon-dmg
          if-no-files-found: error
          retention-days: 14
          path: |
            ../.dataarm-artifacts/target/aarch64-apple-darwin/release/bundle/dmg/Dataarm_*.dmg
            ../.dataarm-artifacts/ci-artifacts/github-packaging-manifest.json
