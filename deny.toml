[graph]
# The product is currently packaged and shipped for Apple Silicon macOS only.
targets = ["aarch64-apple-darwin"]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
unsound = "all"
unused-ignored-advisory = "deny"
ignore = [
  { id = "RUSTSEC-2025-0075", reason = "Tauri 2.11.1 currently reaches urlpattern 0.3.0 through tauri-utils, and the rust-unic replacement remains upstream-blocked." },
  { id = "RUSTSEC-2025-0080", reason = "Tauri 2.11.1 currently reaches urlpattern 0.3.0 through tauri-utils, and the rust-unic replacement remains upstream-blocked." },
  { id = "RUSTSEC-2025-0081", reason = "Tauri 2.11.1 currently reaches urlpattern 0.3.0 through tauri-utils, and the rust-unic replacement remains upstream-blocked." },
  { id = "RUSTSEC-2025-0098", reason = "Tauri 2.11.1 currently reaches urlpattern 0.3.0 through tauri-utils, and the rust-unic replacement remains upstream-blocked." },
  { id = "RUSTSEC-2025-0100", reason = "Tauri 2.11.1 currently reaches urlpattern 0.3.0 through tauri-utils, and the rust-unic replacement remains upstream-blocked." }
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib"
]
confidence-threshold = 0.93
unused-allowed-license = "deny"
unused-license-exception = "deny"
exceptions = [
  { crate = "cssparser", allow = ["MPL-2.0"] },
  { crate = "cssparser-macros", allow = ["MPL-2.0"] },
  { crate = "dtoa-short", allow = ["MPL-2.0"] },
  { crate = "htmlcut-selectors", allow = ["MPL-2.0"] },
  { crate = "option-ext", allow = ["MPL-2.0"] },
  { crate = "selectors", allow = ["MPL-2.0"] }
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "https://github.com/resoltico/ffhn.git",
  "https://github.com/resoltico/HTMLCut.git",
]
