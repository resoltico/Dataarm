[graph]
# The product is currently packaged and shipped for Apple Silicon macOS only.
targets = ["aarch64-apple-darwin"]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
unsound = "all"
unused-ignored-advisory = "deny"
ignore = [
  { id = "RUSTSEC-2025-0057", reason = "Transitive fxhash usage comes from Tauri's HTML parsing stack and has no safe upstream replacement yet." },
  { id = "RUSTSEC-2025-0075", reason = "Transitive rust-unic advisory in tauri-utils/urlpattern; no safe upgrade is currently available upstream." },
  { id = "RUSTSEC-2025-0080", reason = "Transitive rust-unic advisory in tauri-utils/urlpattern; no safe upgrade is currently available upstream." },
  { id = "RUSTSEC-2025-0081", reason = "Transitive rust-unic advisory in tauri-utils/urlpattern; no safe upgrade is currently available upstream." },
  { id = "RUSTSEC-2025-0098", reason = "Transitive rust-unic advisory in tauri-utils/urlpattern; no safe upgrade is currently available upstream." },
  { id = "RUSTSEC-2025-0100", reason = "Transitive rust-unic advisory in tauri-utils/urlpattern; no safe upgrade is currently available upstream." }
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "MIT",
  "Unicode-3.0",
  "Zlib"
]
confidence-threshold = 0.93
unused-allowed-license = "deny"
unused-license-exception = "deny"
exceptions = [
  { crate = "cssparser", allow = ["MPL-2.0"] },
  { crate = "cssparser-macros", allow = ["MPL-2.0"] },
  { crate = "dtoa-short", allow = ["MPL-2.0"] },
  { crate = "option-ext", allow = ["MPL-2.0"] },
  { crate = "selectors", allow = ["MPL-2.0"] }
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
