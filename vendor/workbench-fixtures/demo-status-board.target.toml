schema_name = "ffhn.target"
schema_version = 4
target_id = "status_board"
display_name = "Demo status board"
enabled = true

[target]
kind = "file"
file_path = "__DATAARM_DEMO_PATH__/sources/status-board.html"

[fetch]
engine = "file"
max_bytes = 2000000

[selection]
kind = "css_selector"
selector = ".status-card"
match = "single"

[compare]
basis = "text"
whitespace = "normalize"
rewrite_urls = false

[[compare.canonicalization]]
kind = "trim"
